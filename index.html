<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; height: 100vh; background-color: #333; font-family: sans-serif; }
        
        .card { 
            background-color: #555; 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            width: 180px; 
            transition: 0.3s;
            text-align: center;
        }
        .card.active { background-color: #2e7d32; } 
        
        .icon-box { width: 50px; height: 50px; background: #888; border-radius: 10px; margin: 0 auto 10px; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        p { margin: 5px 0; color: #ccc; }
        
        .control-area { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        .power-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .val-big { font-size: 1.5rem; font-weight: bold; color: #fff; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <div class="icon-box"></div>
        <h2>LED Bulb</h2>
        <p id="status">Off</p>
        <p id="power">0 kW</p>
        <div class="control-area">
            <div id="indicator" style="width: 10px; height: 10px; background: grey; border-radius: 50%;"></div>
            <button class="power-btn" onclick="togglePower()">⏻</button>
        </div>
    </div>

    <div class="card">
        <h2>Nhiệt độ</h2>
        <div class="val-big"><span id="temp">--</span>°C</div>
    </div>

    <div class="card">
        <h2>Độ ẩm</h2>
        <div class="val-big"><span id="humi">--</span>%</div>
    </div>

    <script src="https://unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget(); 
        
        let onlight = null;       
        let offlight = null;      

        eraWidget.init({
            onConfiguration: (config) => {
                // Nhận cấu hình Action để điều khiển đèn
                onlight = config.actions[0];
                offlight = config.actions[1];
            },
            onValues: (values) => {
                // values[0] -> Nhận trạng thái Đèn từ V0
                if (values[0]) updateUI(values[0].value == 1);
                
                // values[1] -> Nhận Nhiệt độ từ V1 (Hiển thị 1 số sau dấu phẩy)
                if (values[1]) document.getElementById('temp').innerText = parseFloat(values[1].value).toFixed(1);
                
                // values[2] -> Nhận Độ ẩm từ V2 (Hiển thị 1 số sau dấu phẩy)
                if (values[2]) document.getElementById('humi').innerText = parseFloat(values[2].value).toFixed(1);
            }
        });

        function updateUI(isOn) {
            const card = document.getElementById('myCard');
            if (isOn) {
                card.classList.add('active');
                document.getElementById('status').innerText = "On";
                document.getElementById('power').innerText = "5 kW";
                document.getElementById('indicator').style.background = "#4caf50";
            } else {
                card.classList.remove('active');
                document.getElementById('status').innerText = "Off";
                document.getElementById('power').innerText = "0 kW";
                document.getElementById('indicator').style.background = "grey";
            }
        }

        async function togglePower() {
            const currentState = document.getElementById('myCard').classList.contains('active');
            const newState = !currentState;
            
            updateUI(newState);
            
            if (newState && onlight) {
                await eraWidget.triggerAction(onlight.action, null);
            } else if (!newState && offlight) {
                await eraWidget.triggerAction(offlight.action, null);
            }
        }
    </script>
</body>
</html>
