<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #333; font-family: sans-serif; }
        .card { background-color: #555; color: white; padding: 20px; border-radius: 15px; width: 200px; transition: 0.3s; }
        .card.active { background-color: #2e7d32; } 
        .icon-box { width: 50px; height: 50px; background: #888; border-radius: 10px; margin-bottom: 10px; }
        h2 { margin: 0; font-size: 1.2rem; }
        p { margin: 5px 0; color: #ccc; }
        .control-area { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .power-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <div class="icon-box"></div>
        <h2>LED Bulb</h2>
        <p id="status">Off</p>
        <p id="power">0 kWh</p>
        <div class="control-area">
            <div id="indicator" style="width: 10px; height: 10px; background: grey; border-radius: 50%;"></div>
            <button class="power-btn" onclick="togglePower()">⏻</button>
        </div>
    </div>

    <script src="https://unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget(); 
        let onlight = null;
        let offlight = null;

        // Init để lấy cấu hình hành động từ Server
        eraWidget.init({
            onConfiguration: (config) => {
                onlight = config.actions[0];
                offlight = config.actions[1];
            }
        });

        let isOn = false;

        // Hàm xử lý khi bấm nút nguồn
        async function togglePower() {
            isOn = !isOn;
            const card = document.getElementById('myCard');
            
            if (isOn) {
                // Hiển thị trạng thái Bật
                card.classList.add('active');
                document.getElementById('status').innerText = "On";
                document.getElementById('power').innerText = "5 kWh";
                document.getElementById('indicator').style.background = "#4caf50";
                
                // Gửi lệnh bật
                if (onlight) await eraWidget.triggerAction(onlight.action, null);
            } else {
                // Hiển thị trạng thái Tắt
                card.classList.remove('active');
                document.getElementById('status').innerText = "Off";
                document.getElementById('power').innerText = "0 kWh";
                document.getElementById('indicator').style.background = "grey";
                
                // Gửi lệnh tắt
                if (offlight) await eraWidget.triggerAction(offlight.action, null);
            }
        }
    </script>
</body>
</html>
