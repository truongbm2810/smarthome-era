<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; height: 100vh; background-color: #333; font-family: sans-serif; }
        
        .card { 
            background-color: #555; 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            width: 180px; 
            transition: 0.3s;
            text-align: center;
        }
        .card.active { background-color: #2e7d32; } 
        
        .icon-box { width: 50px; height: 50px; background: #888; border-radius: 10px; margin: 0 auto 10px; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        p { margin: 5px 0; color: #ccc; }
        
        .control-area { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        .power-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .val-big { font-size: 1.5rem; font-weight: bold; color: #fff; margin: 10px 0; }
        
        .input-area { margin-top: 10px; display: flex; justify-content: center; gap: 5px; }
        input { width: 50px; padding: 5px; border-radius: 5px; border: none; }
        button.send-btn { padding: 5px 8px; border-radius: 5px; border: none; cursor: pointer; background: #888; color: white; }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <div class="icon-box"></div>
        <h2>LED Bulb</h2>
        <p id="status">Off</p>
        <p id="power">0 kW</p>
        <div class="control-area">
            <div id="indicator" style="width: 10px; height: 10px; background: grey; border-radius: 50%;"></div>
            <button class="power-btn" onclick="togglePower()">⏻</button>
        </div>
    </div>

    <div class="card">
        <h2>Nhiệt độ</h2>
        <div class="val-big"><span id="temp">--</span>°C</div>
        <div class="input-area">
            <input type="number" id="tempInput" placeholder="Set">
            <button class="send-btn" onclick="sendSet('temp')">Gửi</button>
        </div>
    </div>

    <div class="card">
        <h2>Độ ẩm</h2>
        <div class="val-big"><span id="humi">--</span>%</div>
        <div class="input-area">
            <input type="number" id="humiInput" placeholder="Set">
            <button class="send-btn" onclick="sendSet('humi')">Gửi</button>
        </div>
    </div>

    <script src="https://unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget(); 
        let onlight = null;
        let offlight = null;
        let setTempAction = null;
        let setHumiAction = null;

        eraWidget.init({
            onConfiguration: (config) => {
                onlight = config.actions[0];
                offlight = config.actions[1];
                setTempAction = config.actions[2];
                setHumiAction = config.actions[3];
            },
            onValues: (values) => {
                if (values[0]) updateUI(values[0].value == 1);
                if (values[1]) document.getElementById('temp').innerText = parseFloat(values[1].value).toFixed(1);
                if (values[2]) document.getElementById('humi').innerText = parseFloat(values[2].value).toFixed(0);
            }
        });

        function updateUI(isOn) {
            const card = document.getElementById('myCard');
            if (isOn) {
                card.classList.add('active');
                document.getElementById('status').innerText = "On";
                document.getElementById('power').innerText = "5 kW";
                document.getElementById('indicator').style.background = "#4caf50";
            } else {
                card.classList.remove('active');
                document.getElementById('status').innerText = "Off";
                document.getElementById('power').innerText = "0 kW";
                document.getElementById('indicator').style.background = "grey";
            }
        }

        async function togglePower() {
            const currentState = document.getElementById('myCard').classList.contains('active');
            const newState = !currentState;
            
            updateUI(newState);
            
            if (newState && onlight) {
                await eraWidget.triggerAction(onlight.action, null);
            } else if (!newState && offlight) {
                await eraWidget.triggerAction(offlight.action, null);
            }
        }

        async function sendSet(type) {
            const id = (type === 'temp') ? 'tempInput' : 'humiInput';
            const actionObj = (type === 'temp') ? setTempAction : setHumiAction;
            const val = document.getElementById(id).value;

            // Nếu người dùng không nhập gì mà bấm Gửi thì bỏ qua
            if (val === "") return;

            // 1. ÉP HIỂN THỊ SỐ LÊN GIAO DIỆN NGAY LẬP TỨC 
            if (type === 'temp') {
                document.getElementById('temp').innerText = parseFloat(val).toFixed(1);
            } else {
                document.getElementById('humi').innerText = parseFloat(val).toFixed(0);
            }

            // 2. Xóa trắng ô nhập liệu đi cho gọn
            document.getElementById(id).value = "";

            // 3. Gửi lệnh lên server E-Ra
            if (actionObj) {
                // ĐÃ SỬA TẠI ĐÂY: Gói dữ liệu vào object { value: ... } để đè số 0 mặc định
                await eraWidget.triggerAction(actionObj.action, { value: parseFloat(val) });
            } else {
                console.log("Bạn chưa cấu hình Action gửi Nhiệt độ/Độ ẩm trên E-Ra. Chỉ test giao diện.");
            }
        }
    </script>
</body>
</html>
