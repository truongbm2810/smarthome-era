<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ra Smart Home</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Khung bo tròn giả lập giao diện ứng dụng di động */
        .phone-container {
            background-color: #f5f7fb;
            width: 100%;
            max-width: 360px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        /* Khối hiển thị thông tin Cảm biến phía trên */
        .header-dash {
            background: linear-gradient(135deg, #2cb1d8 0%, #1e90ff 100%);
            padding: 25px 20px;
            color: white;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .header-dash h2 {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .sensor-row {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 16px;
            backdrop-filter: blur(5px);
        }

        .sensor-box {
            text-align: center;
            flex: 1;
        }

        .sensor-box:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sensor-num {
            font-size: 22px;
            font-weight: 700;
        }

        .sensor-lbl {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* Khu vực hiển thị lưới các thiết bị điều khiển */
        .content-body {
            padding: 20px;
        }

        .section-title {
            font-size: 14px;
            color: #444;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .device-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .device-card {
            background: white;
            border-radius: 16px;
            padding: 15px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 110px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #edf0f5;
        }

        .device-icon {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .device-name {
            font-size: 13px;
            color: #333;
            font-weight: 600;
        }

        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .status-txt {
            font-size: 11px;
            color: #999;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Giao diện thanh gạt Công tắc (Switch Toggle) */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #d1d5db; transition: .3s; border-radius: 20px;
        }

        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }

        input:checked + .slider { background-color: #2cb1d8; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header-dash">
            <h2>Xin chào,</h2>
            <div class="sensor-row">
                <div class="sensor-box">
                    <div class="sensor-num" id="txt-temp">--.-°C</div>
                    <div class="sensor-lbl">🌡️ Nhiệt độ</div>
                </div>
                <div class="sensor-box">
                    <div class="sensor-num" id="txt-hum">--%</div>
                    <div class="sensor-lbl">💧 Độ ẩm</div>
                </div>
            </div>
        </div>

        <div class="content-body">
            <div class="section-title">Điều khiển thiết bị</div>
            <div class="device-grid">
                
                <div class="device-card">
                    <div class="device-icon">💡</div>
                    <div class="device-name">Đèn ngủ</div>
                    <div class="switch-row">
                        <span class="status-txt" id="lbl-light">OFF</span>
                        <label class="switch">
                            <input type="checkbox" id="chk-light" onchange="triggerLight(this)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="device-card">
                    <div class="device-icon">🎐</div>
                    <div class="device-name">Quạt máy</div>
                    <div class="switch-row">
                        <span class="status-txt" id="lbl-fan">OFF</span>
                        <label class="switch">
                            <input type="checkbox" id="chk-fan" onchange="triggerFan(this)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

            </div>
        </div>
    </div>

<script>
    const eraWidget = new EraWidget();
    
    // Khởi tạo các biến chứa cấu hình hành động điều khiển
    let action_bat_den = null;
    let action_tat_den = null;
    let action_bat_quat = null;
    let action_tat_quat = null;
    
    let sensorsConfig = [];

    eraWidget.init({
        onConfiguration: (configuration) => {
            // Lấy mảng Actions xếp theo thứ tự từ trên xuống dưới trên Dashboard E-Ra
            const actions = configuration.action || [];
            action_bat_den = actions[0]; // Hàng 1
            action_tat_den = actions[1]; // Hàng 2
            action_bat_quat = actions[2]; // Hàng 3
            action_tat_quat = actions[3]; // Hàng 4

            // Lấy mảng Realtime Configs theo thứ tự điền trên Dashboard
            sensorsConfig = configuration.sensors || [];
        },
        onValues: (values) => {
            // 1. Nhận giá trị thực và hiển thị Nhiệt độ (Hàng Realtime 1)
            if (sensorsConfig[0] && values[sensorsConfig[0].id]) {
                const rawTemp = values[sensorsConfig[0].id].value;
                document.getElementById("txt-temp").innerText = parseFloat(rawTemp).toFixed(1) + "°C";
            }
            
            // 2. Nhận giá trị thực và hiển thị Độ ẩm (Hàng Realtime 2)
            if (sensorsConfig[1] && values[sensorsConfig[1].id]) {
                const rawHum = values[sensorsConfig[1].id].value;
                document.getElementById("txt-hum").innerText = Math.round(rawHum) + "%";
            }

            // 3. ĐỒNG BỘ TRẠNG THÁI NGƯỢC: Cập nhật thanh gạt Web khi thay đổi trên nút ảo hệ thống
            if (action_bat_den && values[action_bat_den.id]) {
                const state = parseInt(values[action_bat_den.id].value);
                const chk = document.getElementById("chk-light");
                const lbl = document.getElementById("lbl-light");
                chk.checked = (state === 1);
                lbl.innerText = (state === 1) ? "ON" : "OFF";
                lbl.style.color = (state === 1) ? "#2cb1d8" : "#999";
            }

            if (action_bat_quat && values[action_bat_quat.id]) {
                const state = parseInt(values[action_bat_quat.id].value);
                const chk = document.getElementById("chk-fan");
                const lbl = document.getElementById("lbl-fan");
                chk.checked = (state === 1);
                lbl.innerText = (state === 1) ? "ON" : "OFF";
                lbl.style.color = (state === 1) ? "#2cb1d8" : "#999";
            }
        }
    });

    // Hàm điều khiển gạt Switch Đèn ngủ
    async function triggerLight(checkbox) {
        const lbl = document.getElementById("lbl-light");
        lbl.innerText = checkbox.checked ? "ON" : "OFF";
        lbl.style.color = checkbox.checked ? "#2cb1d8" : "#999";

        if (checkbox.checked) {
            if (action_bat_den) await eraWidget.triggerAction(action_bat_den.action, null);
        } else {
            if (action_tat_den) await eraWidget.triggerAction(action_tat_den.action, null);
        }
    }

    // Hàm điều khiển gạt Switch Quạt máy
    async function triggerFan(checkbox) {
        const lbl = document.getElementById("lbl-fan");
        lbl.innerText = checkbox.checked ? "ON" : "OFF";
        lbl.style.color = checkbox.checked ? "#2cb1d8" : "#999";

        if (checkbox.checked) {
            if (action_bat_quat) await eraWidget.triggerAction(action_bat_quat.action, null);
        } else {
            if (action_tat_quat) await eraWidget.triggerAction(action_tat_quat.action, null);
        }
    }
</script>

</body>
</html>
