<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>E-Ra Smart Home Control</title>
    <script src="https://unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 320px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sensor-box { display: flex; justify-content: space-between; margin-bottom: 20px; background: #eef6ff; padding: 15px; border-radius: 15px; text-align: center; }
        .value { font-size: 20px; font-weight: bold; color: #007bff; }
        .device-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 22px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: #2196F3; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body>

<div class="card">
    <div class="sensor-box">
        <div>Nhiệt độ:<div class="value" id="t">--.-°C</div></div>
        <div>Độ ẩm:<div class="value" id="h">--%</div></div>
    </div>
    
    <div class="device-row">
        <span>Đèn phòng ngủ</span>
        <label class="switch">
            <input type="checkbox" id="sw-light" onchange="triggerAction(this, 'light')">
            <span class="slider"></span>
        </label>
    </div>
    <div class="device-row">
        <span>Quạt máy</span>
        <label class="switch">
            <input type="checkbox" id="sw-fan" onchange="triggerAction(this, 'fan')">
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
    const era = new EraWidget();
    let actions = [];
    let configTemp, configHumi, configLight, configFan;

    era.init({
        onConfiguration: (c) => {
            // Lấy danh sách actions
            actions = c.actions || [];
            
            // GÁN THỨ TỰ DATASTREAM KHỚP 100% VỚI CÀI ĐẶT TRÊN WEB CỦA BẠN:
            configTemp  = c.realtime_configs[0];  // Dòng 1: Nhiệt độ (V1)
            configHumi  = c.realtime_configs[1];  // Dòng 2: Độ ẩm (V2)
            configLight = c.realtime_configs[2];  // Dòng 3: Đèn phòng ngủ (V0)
            configFan   = c.realtime_configs[3];  // Dòng 4: Quạt máy (V3)
        },
        onValues: (v) => {
            // Cập nhật số hiển thị cho Nhiệt độ & Độ ẩm
            if (configTemp && v[configTemp.id]) {
                document.getElementById('t').innerText = parseFloat(v[configTemp.id].value).toFixed(1) + "°C";
            }
            if (configHumi && v[configHumi.id]) {
                document.getElementById('h').innerText = Math.round(v[configHumi.id].value) + "%";
            }

            // Cập nhật trạng thái công tắc Đèn & Quạt (Không bị nhảy loạn nữa)
            if (configLight && v[configLight.id]) {
                document.getElementById('sw-light').checked = (v[configLight.id].value == 1);
            }
            if (configFan && v[configFan.id]) {
                document.getElementById('sw-fan').checked = (v[configFan.id].value == 1);
            }
        }
    });

    // Hàm gửi lệnh khi bạn bấm gạt công tắc
    async function triggerAction(el, type) {
        let act = null;
        
        // Điều kiện lấy Action: 
        // light -> [0] Bật, [1] Tắt
        // fan -> [2] Bật, [3] Tắt
        if(type === 'light') act = el.checked ? actions[0] : actions[1];
        if(type === 'fan') act = el.checked ? actions[2] : actions[3];
        
        if(act) {
            await era.triggerAction(act.action, null);
        } else {
            console.error("Chưa tìm thấy Action! Bạn hãy kiểm tra lại Tab Actions trên Web E-Ra.");
        }
    }
</script>
</body>
</html>
